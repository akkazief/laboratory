{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <title>Shop</title>
</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-md bg-dark py-4">
            <div class="container">
                <a class="navbar-brand" href="{% url 'main' %}">
                   <img src="{% static 'images/logo.jpg' %}" alt="logo" height="50" class="rounded">
                </a>

                {% block search %}
                {% endblock %}

                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto text-white ">
                        <li class="nav-item ">
                            {% block add_product %}
                            {% endblock %}
                        </li>
                        <li class="nav-item">
                            {% block add_category %}
                            {% endblock %}
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="{% url 'cart' %}">Корзина</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="{% url 'main' %}">Главная</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    <div class="container flex-grow-1 py-4">
        {% block content %}
        {% endblock %}
    </div>
    <footer class="bg-dark text-white text-center py-3 mt-5 border-top">
            <p class="mb-0">Laba akkaziev_aktan</p>
    </footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
