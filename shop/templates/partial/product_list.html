<div class="mb-4 d-flex gap-2 flex-wrap align-items-center">
    <span>По категориям: </span>
    {% for cat in categories %}
        <a href="{% url 'products_by_category' cat.name %}" class="btn btn-outline-secondary btn-sm">{{ cat.name }}</a>
    {% endfor %}
</div>

<div class="row row-cols-1 row-cols-md-3 g-4">
{% for product in products %}
    <div class="col">
        <div class="card border-secondary h-100">
            <div class="card-header" style="height: 300px">
                <img src="{{ product.img }}"
                     class="card-img-top rounded"
                     alt="{{ product.name }}"
                     style="height: 100%; object-fit: contain;">
            </div>
            <div class="card-body d-flex justify-content-between align-items-center">
                <h6 class="mb-0 fw-bold">{{ product.name }}</h6>
                <a href="{% url 'products_by_category' product.category %}" class="text-muted text-decoration-none">{{ product.category }}</a>
            </div>

            <div class="card-footer d-flex justify-content-between align-items-center">
                <h6 class="mb-0">{{ product.price }} сом</h6>
                <div class="d-flex gap-2">
                    <a href="{% url 'product_view' product.pk %}" class="btn btn-sm btn-outline-primary">
                        <i class="fa-regular fa-eye"></i>
                    </a>
                    <a href="{% url 'product_update' product.pk %}" class="btn btn-sm btn-outline-warning">
                        <i class="fa-regular fa-pen-to-square"></i>
                    </a>
                    <a href="{% url 'product_delete' product.pk %}" class="btn btn-sm btn-outline-danger">
                        <i class="fa-regular fa-trash-can"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>
    {% empty %}
        <p>Товаров пока нет</p>
    {% endfor %}
</div>
