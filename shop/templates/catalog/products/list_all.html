{% extends "base.html" %}

{% block add_product %}
    <a class="nav-link text-white" href="{% url 'add_product' %}">Добавить товар</a>
{% endblock %}




{% block add_category %}
    <a class=" nav-link text-white" href="{% url 'add_category' %}">Добавить категорию</a>
{% endblock %}

{% block search %}
    <form method="GET" class="d-flex gap-2">
        <input type="search" name="query" value="{{ request.GET.query }}"
               class="form-control" placeholder="Поиск..." aria-label="Search">
    <button type="submit" class="btn btn-dark">Найти</button>
</form>
{% endblock %}


{% block content %}

<div class="page-header d-flex justify-content-between align-items-center my-4 p-3">
    <h1>Все Товары</h1>
</div>

{% include "partial/product_list.html" %}


{% endblock %}
