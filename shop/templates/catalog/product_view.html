{% extends "base.html" %}

{% block add_product %}
    <a class="btn btn-primary btn-sm" href="{% url 'add_product' %}">Добавить товар</a>
{% endblock %}

{% block add_category %}
    <a class="btn btn-primary btn-sm" href="{% url 'add_category' %}">Добавить категорию</a>
{% endblock %}


{% block content %}
    <div class="card my-5">
        <div class="card-header fs-4 text-center">{{task.status}}</div>
        <div class="card-body">
            <figure>
                 <blockquote class="blockquote">
                    <p> <b>Задание:</b> {{ task.title }}</p>
                </blockquote>

                <blockquote class="blockquote">
                    <p>{{ task.description|linebreaks }}</p>
                </blockquote>

                <figcaption class="blockquote-footer mt-3">
                   <b>deadline:</b> {{ task.deadline }}
                </figcaption>
            </figure>
        </div>
    </div>
{% endblock %}
